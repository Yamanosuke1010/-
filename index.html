<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>電脳チンチロリン -勝者厳選・最下位倍々版-</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #ffcc00; font-size: 22px; margin: 5px 0 2px 0; }
        .subtitle { font-size: 11px; color: #888; margin-bottom: 12px; }
        .box { background: #222; padding: 14px; border-radius: 12px; margin-bottom: 15px; font-size: 14px; width: 100%; max-width: 480px; }
        select, input, button {
            font-size: 15px; padding: 6px 10px; background: #333; color: white;
            border: 1px solid #555; border-radius: 6px; margin: 3px;
        }
        .name-input-group { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; text-align: left; }
        .name-input-item { display: flex; align-items: center; justify-content: space-between; }
        .name-input-item input { width: 65%; }

        /* 大画面お椀・リアル3Dサイコロ表示エリア */
        #bowl-container {
            background: #1a1a1a;
            border: 3px dashed #444;
            border-radius: 16px;
            padding: 15px;
            width: 100%;
            max-width: 480px;
            margin-bottom: 15px;
        }
        #bowl-title { font-size: 14px; color: #ffcc00; font-weight: bold; margin-bottom: 15px; min-height: 20px; }
        #main-bowl {
            background: radial-gradient(circle, #ffffff 65%, #dcdcdc 100%);
            border: 12px solid #8b4513;
            border-radius: 50%;
            width: 240px;
            height: 240px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            perspective: 400px;
        }
        
        /* リアルCSS 3Dダイス構造 */
        .dice-3d {
            width: 40px;
            height: 40px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
        }
        .face {
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: black;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        .f1 { transform: rotateY(0deg) translateZ(20px); color: #d00; font-size: 34px; }
        .f6 { transform: rotateY(180deg) translateZ(20px); }
        .f2 { transform: rotateY(90deg) translateZ(20px); }
        .f5 { transform: rotateY(-90deg) translateZ(20px); }
        .f3 { transform: rotateX(90deg) translateZ(20px); }
        .f4 { transform: rotateX(-90deg) translateZ(20px); }

        /* お椀の揺れ演出 */
        .shaking { animation: shake 0.1s infinite alternate; }
        @keyframes shake {
            0% { transform: translate(5px, 3px); }
            100% { transform: translate(-5px, -3px); }
        }
        
        .btn-main {
            background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
            border: none; color: #111; padding: 14px 0; width: 85%; max-width: 320px;
            font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,153,0,0.3); margin: 5px auto 10px auto;
            display: block; -webkit-tap-highlight-color: transparent;
        }
        .btn-main:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        .btn-nav { background: #444; color: #eee; font-size: 12px; padding: 6px 12px; border: none; border-radius: 6px; margin: 5px; }

        /* プレイヤーカード一覧 */
        .player-list { width: 100%; max-width: 480px; }
        .p-card {
            background: #2a2a2a; padding: 12px; border-radius: 12px; margin: 8px 0;
            border-left: 5px solid #555; text-align: left; display: flex; justify-content: space-between; align-items: center;
        }
        .p-card.current-roller { border-left: 5px solid #ffcc00; background: #333322; box-shadow: 0 0 8px rgba(255,204,0,0.3); }
        .p-card.win { border-left: 5px solid #28a745; background: #223326; }
        .p-card.lose { border-left: 5px solid #dc3545; background: #332222; }
        
        .p-info { flex: 1; }
        .p-name { font-weight: bold; font-size: 15px; color: #fff; display: flex; align-items: center; gap: 5px; }
        .p-money { font-size: 12px; color: #ccc; margin-top: 2px; }
        .p-status { font-size: 14px; font-weight: bold; color: #ff3366; margin-top: 2px; }
        
        /* 🛠 修正：結果一覧のリアルなドットサイコロのスタイル（CSS描画） */
        .p-dice-preview {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            padding: 6px 8px;
            border-radius: 8px;
            min-width: 100px;
        }
        .mini-die-plate {
            width: 24px;
            height: 24px;
            background: #ffffff;
            border-radius: 4px;
            position: relative;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.6);
        }
        /* ドット配置の共通パーツ */
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #000000;
            border-radius: 50%;
        }
        /* 1の目だけ大きな赤丸 */
        .dot-center-red {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #d00000;
            border-radius: 50%;
            top: 8px;
            left: 8px;
        }
        /* 各位置の指定 */
        .top-left     { top: 4px; left: 4px; }
        .top-right    { top: 4px; right: 4px; }
        .mid-left     { top: 10px; left: 4px; }
        .center       { top: 10px; left: 10px; }
        .mid-right    { top: 10px; right: 4px; }
        .bottom-left  { bottom: 4px; left: 4px; }
        .bottom-right { bottom: 4px; right: 4px; }

        .mini-die-empty {
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .badge { font-size: 10px; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .badge.win-badge { background: #28a745; color: white; }
        .badge.lose-badge { background: #dc3545; color: white; }
        
        /* アコーディオンログ */
        .accordion-btn { background: #222; border: none; color: #ffcc00; width: 100%; padding: 8px; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .log-box { font-size: 12px; color: #aaa; max-height: 120px; overflow-y: auto; text-align: left; padding: 8px; background: #1a1a1a; border-radius: 0 0 6px 6px; display: none; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <h1>🎲 電脳チンチロリン -酒席最強版-</h1>
    <div class="subtitle">Presented by Syunki.Jr</div>

    <!-- 設定エリア -->
    <div id="setup-area" class="box">
        <div>
            参加人数:
            <select id="player-num" onchange="generateNameInputs()">
                <option value="2">2人</option><option value="3">3人</option><option value="4">4人</option>
            </select>
        </div>
        <div class="name-input-group" id="name-inputs-container"></div>
        <button onclick="initGame()" style="background: linear-gradient(135deg, #ffcc00, #ff9900); color:black; font-weight:bold; width:100%; margin-top:10px;">ゲーム開始</button>
        <button onclick="resetData()" style="background:#555; font-size:11px; width:100%; margin-top:5px;">全データを初期化</button>
    </div>

    <!-- ナビゲーションエリア（プレイ中のみ表示） -->
    <div id="nav-area" style="display:none; width:100%; max-width:480px; text-align:right;">
        <button class="btn-nav" onclick="confirmGoToTop()">🏠 トップ画面に戻る</button>
    </div>

    <!-- ステータス・BETエリア -->
    <div id="game-status" class="box" style="display:none;">
        <span id="round-title" style="font-weight:bold; color:#ffcc00;"></span>
        <div id="bet-inputs" style="margin-top: 8px;"></div>
    </div>

    <!-- 大画面サイコロお椀エリア -->
    <div id="bowl-container" style="display:none;">
        <div id="bowl-title">勝負開始ボタンを押してください</div>
        <div id="main-bowl">
            <div class="dice-3d" id="d3d1">
                <div class="face f1">・</div><div class="face f6">⚅</div><div class="face f2">⚁</div><div class="face f5">⚄</div><div class="face f3">⚂</div><div class="face f4">⚃</div>
            </div>
            <div class="dice-3d" id="d3d2">
                <div class="face f1">・</div><div class="face f6">⚅</div><div class="face f2">⚁</div><div class="face f5">⚄</div><div class="face f3">⚂</div><div class="face f4">⚃</div>
            </div>
            <div class="dice-3d" id="d3d3">
                <div class="face f1">・</div><div class="face f6">⚅</div><div class="face f2">⚁</div><div class="face f5">⚄</div><div class="face f3">⚂</div><div class="face f4">⚃</div>
            </div>
        </div>
    </div>

    <!-- メインアクションボタン -->
    <button class="btn-main" id="action-btn" onclick="handleAction()" style="display:none;"></button>

    <!-- プレイヤー一覧 -->
    <div class="player-list" id="players-display"></div>

    <!-- 可変ログエリア -->
    <div class="box" id="log-area" style="display:none; padding:0;">
        <button class="accordion-btn" onclick="toggleLog()">
            <span>📜 勝負の足跡 (タップで開閉)</span>
            <span id="accordion-arrow">▼</span>
        </button>
        <div id="logs" class="log-box"></div>
    </div>

    <script>
        const rotateAngles = {
            1: {x: 0, y: 0}, 6: {x: 0, y: 180}, 2: {x: 0, y: -90},
            5: {x: 0, y: 90}, 3: {x: -90, y: 0}, 4: {x: 90, y: 0}
        };

        let gameState = "SETUP";
        let numPlayers = 2;
        let players = [];
        let globalBet = 1;
        let currentPlayerTurn = 0;
        let isRolling = false;
        let logOpen = false;

        window.onload = function() { generateNameInputs(); };

        function generateNameInputs() {
            const container = document.getElementById('name-inputs-container');
            const n = +document.getElementById('player-num').value;
            let html = "";
            for(let i = 1; i <= n; i++) {
                html += `
                    <div class="name-input-item">
                        <span>プレイヤー ${i} の名前:</span>
                        <input type="text" id="pname-${i}" value="プレイヤー ${i}" maxlength="8">
                    </div>`;
            }
            container.innerHTML = html;
        }

        function initGame() {
            numPlayers = +document.getElementById('player-num').value;
            players = [];
            
            for (let i = 1; i <= numPlayers; i++) {
                let inputName = document.getElementById(`pname-${i}`).value.trim() || `プレイヤー ${i}`;
                let savedMoney = localStorage.getItem(`chinchiro_sake_custom_p_${inputName}`);
                players.push({
                    id: i,
                    name: inputName,
                    money: savedMoney !== null ? +savedMoney : 0,
                    dice: [1, 1, 1],
                    role: null,
                    rollCount: 0,
                    outcome: ""
                });
            }
            
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('nav-area').style.display = 'block';
            document.getElementById('game-status').style.display = 'block';
            document.getElementById('bowl-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'block';
            document.getElementById('log-area').style.display = 'block';
            
            addLog("🍻 カスタム配当精算チンチロリン勝負が始まりました！");
            startBetting();
        }

        function saveMoney() {
            players.forEach(p => localStorage.setItem(`chinchiro_sake_custom_p_${p.name}`, p.money));
        }

        function resetData() {
            if(confirm("全員の総飲酒杯数を0杯にリセットしますか？")) {
                localStorage.clear();
                alert("リセットしました。");
                location.reload();
            }
        }

        function confirmGoToTop() {
            if(confirm("トップ画面に戻りますか？\n(現在の勝負データは破棄されます)")) {
                location.reload();
            }
        }

        function toggleLog() {
            const lb = document.getElementById('logs');
            const arrow = document.getElementById('accordion-arrow');
            logOpen = !logOpen;
            lb.style.display = logOpen ? 'block' : 'none';
            arrow.innerText = logOpen ? '▲' : '▼';
        }

        function addLog(msg) {
            const logs = document.getElementById('logs');
            logs.innerHTML = `<div>${msg}</div>` + logs.innerHTML;
        }

        function updateMainBowl3D(dice, shake = false) {
            const b = document.getElementById('main-bowl');
            if(shake) {
                b.classList.add('shaking');
                for(let i=1; i<=3; i++) {
                    let rx = Math.floor(Math.random()*4)*90;
                    let ry = Math.floor(Math.random()*4)*90;
                    document.getElementById(`d3d${i}`).style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
                }
            } else {
                b.classList.remove('shaking');
                for(let i=1; i<=3; i++) {
                    let side = dice[i-1];
                    let angle = rotateAngles[side];
                    let extraX = (Math.floor(Math.random()*3)-1) * 5;
                    let extraY = (Math.floor(Math.random()*3)-1) * 5;
                    document.getElementById(`d3d${i}`).style.transform = `rotateX(${angle.x + extraX}deg) rotateY(${angle.y + extraY}deg)`;
                }
            }
        }

        function startBetting() {
            gameState = "BETTING";
            document.getElementById('round-title').innerText = `💰 基本の賭け杯数設定`;
            document.getElementById('bowl-title').innerText = "この勝負のベースとなる賭け杯数を決めてください";
            document.getElementById('action-btn').innerText = "杯数を確定して勝負開始";
            
            document.getElementById('bet-inputs').innerHTML = `
                <span>この勝負の賭け金: </span>
                <input type="number" id="global-bet-input" value="1" min="1" max="5" style="width:60px;"> 杯
            `;
            
            players.forEach(p => { p.role = null; p.rollCount = 0; p.outcome = ""; });
            updateMainBowl3D([1,1,1]);
            renderPlayers();
        }

        function lockBetting() {
            let inputVal = +document.getElementById('global-bet-input').value;
            if(inputVal < 1) {
                alert("賭け杯数は1杯以上を入力してください。");
                return;
            }
            globalBet = inputVal;
            document.getElementById('bet-inputs').innerHTML = "";
            
            currentPlayerTurn = 0;
            setupNextRoller();
        }

        function setupNextRoller() {
            gameState = "ROLLING_PLAYERS";
            let p = players[currentPlayerTurn];
            
            document.getElementById('round-title').innerText = `🎲 ${p.name} の番`;
            document.getElementById('bowl-title').innerText = `${p.name} の挑戦 (残り ${3 - p.rollCount} 回)`;
            document.getElementById('action-btn').innerText = `お椀を振る！ (${p.rollCount + 1}回目)`;
            
            renderPlayers();
        }

        function runRollingPlayer() {
            isRolling = true;
            document.getElementById('action-btn').disabled = true;
            if (navigator.vibrate) navigator.vibrate([100, 100, 100]);

            let p = players[currentPlayerTurn];
            p.rollCount++;

            let ticks = 0;
            let interval = setInterval(() => {
                updateMainBowl3D([], true);
                ticks++;

                if(ticks > 25) {
                    clearInterval(interval);
                    
                    let d = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
                    p.dice = d;
                    p.role = judgeChinchiro(d);
                    
                    updateMainBowl3D(d, false);
                    
                    if (p.role.t !== "役なし" || p.rollCount >= 3) {
                        addLog(`${p.name}: ${p.rollCount}回目に [ ${d.join(' ')} ] で【${p.role.t}】確定`);
                        moveToNextPlayer();
                    } else {
                        document.getElementById('bowl-title').innerText = `役なし！もう一振り！ (残り ${3 - p.rollCount} 回)`;
                        document.getElementById('action-btn').innerText = `もう一度振る (${p.rollCount + 1}回目)`;
                        document.getElementById('action-btn').disabled = false;
                        isRolling = false;
                        renderPlayers();
                    }
                }
            }, 80);
        }

        function moveToNextPlayer() {
            currentPlayerTurn++;
            let allDone = players.every(p => p.role !== null);
            
            setTimeout(() => {
                isRolling = false;
                document.getElementById('action-btn').disabled = false;
                
                if (allDone) {
                    gameState = "RESULT";
                    calcPayout();
                } else {
                    setupNextRoller();
                }
            }, 1200);
        }

        function calcPayout() {
            document.getElementById('round-title').innerText = "🏆 結果発表とお酒の総精算";
            
            let maxScore = -Infinity;
            let minScore = Infinity;
            
            players.forEach(p => {
                if (p.role.r > maxScore) maxScore = p.role.r;
                if (p.role.r < minScore) minScore = p.role.r;
            });

            let isDrawAll = (maxScore === minScore);
            let winners = [];
            let losers = [];

            players.forEach(p => {
                if (isDrawAll) {
                    p.outcome = "DRAW";
                } else {
                    if (p.role.r === maxScore) { p.outcome = "WIN"; winners.push(p); }
                    else if (p.role.r === minScore) { p.outcome = "LOSE"; losers.push(p); }
                    else { p.outcome = "DRAW"; }
                }
            });

            let logMsg = `【カスタム精算結果】<br>`;

            if (isDrawAll) {
                logMsg += `全員同じ強さの役のため引き分け！誰もいません。🍻<br>`;
                document.getElementById('bowl-title').innerText = `全員引き分け！`;
            } else {
                let winnerNames = winners.map(w => w.name).join(", ");
                let loserNames = losers.map(l => l.name).join(", ");
                document.getElementById('bowl-title').innerText = `勝者: ${winnerNames} / 敗者: ${loserNames}`;

                logMsg += `🎉 トップ勝者：<b>${winnerNames}</b><br>`;
                logMsg += `💀 最下位：<b>${loserNames}</b><br><br>`;
                logMsg += `⚙️ <b>精算内訳:</b><br>`;

                let winnerBaseMultiplier = 0;
                let hasValidWinnerRole = false;

                players.forEach(p => {
                    if (p.role.r >= 90) {
                        winnerBaseMultiplier += p.role.mult;
                        logMsg += `・${p.name} の役: ${p.role.t} ➡️ <b>+${p.role.mult}倍</b> 加算<br>`;
                        hasValidWinnerRole = true;
                    }
                });

                if (!hasValidWinnerRole) {
                    winnerBaseMultiplier = 1;
                    logMsg += `・シゴロ以上の役なし ➡️ ベース <b>1倍</b><br>`;
                }

                let subTotalCups = globalBet * winnerBaseMultiplier;
                logMsg += `💰 勝者側ベース合計: ${globalBet}杯 × ${winnerBaseMultiplier}倍 ＝ <b>${subTotalCups}杯</b><br>`;

                losers.forEach(loser => {
                    let finalDrinkAmt = subTotalCups * loser.role.mult;
                    
                    logMsg += `💥 最下位 <b>${loser.name}</b> の役ペナルティ: 【${loser.role.t}】(✖️ <b>${loser.role.mult}倍</b>)<br>`;
                    logMsg += `➡️ 最終計算: ${subTotalCups}杯 × ${loser.role.mult}倍 ➡️ <b style="color:#ff3366; font-size:15px;">${finalDrinkAmt}杯</b><br>`;

                    loser.money += finalDrinkAmt;
                    logMsg += `➡️ <b>${loser.name}</b> が <b>${finalDrinkAmt} 杯</b> を一気飲み！<br><br>`;
                });
            }

            addLog(logMsg);
            saveMoney();
            renderPlayers();
        }

        function handleAction() {
            if (gameState === "BETTING") lockBetting();
            else if (gameState === "ROLLING_PLAYERS") runRollingPlayer();
            else if (gameState === "RESULT") startBetting();
        }

        // 🛠 修正：各出目のドットパターンをCSS用HTMLで出力するヘルパー
        function getDiceHTML(val) {
            let dots = "";
            if (val === 1) dots = '<div class="dot-center-red"></div>';
            if (val === 2) dots = '<div class="dot top-left"></div><div class="dot bottom-right"></div>';
            if (val === 3) dots = '<div class="dot top-left"></div><div class="dot center"></div><div class="dot bottom-right"></div>';
            if (val === 4) dots = '<div class="dot top-left"></div><div class="dot top-right"></div><div class="dot bottom-left"></div><div class="dot bottom-right"></div>';
            if (val === 5) dots = '<div class="dot top-left"></div><div class="dot top-right"></div><div class="dot center"></div><div class="dot bottom-left"></div><div class="dot bottom-right"></div>';
            if (val === 6) dots = '<div class="dot top-left"></div><div class="dot top-right"></div><div class="dot mid-left"></div><div class="dot mid-right"></div><div class="dot bottom-left"></div><div class="dot bottom-right"></div>';
            
            return `<div class="mini-die-plate">${dots}</div>`;
        }

        function renderPlayers() {
            const display = document.getElementById('players-display');
            let html = "";
            
            players.forEach((p, idx) => {
                let cardClass = "p-card";
                let badge = "";

                if (gameState === "ROLLING_PLAYERS" && idx === currentPlayerTurn) {
                    cardClass += " current-roller";
                }

                if (gameState === "RESULT") {
                    if (p.outcome === "WIN") { cardClass += " win"; badge = `<span class="badge win-badge">🏆 WINNER</span>`; }
                    if (p.outcome === "LOSE") { cardClass += " lose"; badge = `<span class="badge lose-badge">💀 LOSER</span>`; }
                }

                let statusStr = "待機中";
                if (gameState === "ROLLING_PLAYERS" && idx === currentPlayerTurn) statusStr = "🎲 あなたの番です！";
                else if (p.role) statusStr = `確定: ${p.role.t} (${p.rollCount}回目)`;
                else if (p.rollCount > 0) statusStr = `${p.rollCount}回目 目なし`;

                // 🛠 修正：テキスト絵文字を完全に廃止し、ドット描画HTMLを埋め込む
                let dicePreviewHtml = "";
                if (p.role) {
                    dicePreviewHtml = p.dice.map(v => getDiceHTML(v)).join("");
                } else {
                    dicePreviewHtml = `<span class="mini-die-empty">ーーー</span>`;
                }

                html += `
                    <div class="${cardClass}">
                        <div class="p-info">
                            <div class="p-name">${p.name} ${badge}</div>
                            <div class="p-money">累積飲酒量: <b style="color:#ffcc00; font-size:16px;">${p.money}</b> 杯</div>
                            <div class="p-status">${statusStr}</div>
                        </div>
                        <div class="p-dice-preview">${dicePreviewHtml}</div>
                    </div>`;
            });
            display.innerHTML = html;
        }

        function judgeChinchiro(a) {
            const c = {};
            a.forEach(x => c[x] = (c[x] || 0) + 1);
            const v = Object.values(c);
            const s = [...a].sort((x, y) => x - y);
            
            if (a[0] === 1 && a[1] === 1 && a[2] === 1) return { r: 500, t: "ピンゾロ", mult: 5 };
            if (v.includes(3)) return { r: 100 + a[0], t: a[0] + "のアラシ", mult: 3 };
            if ("" + s === "4,5,6") return { r: 90, t: "シゴロ", mult: 2 };
            if ("" + s === "1,2,3") return { r: -1, t: "ヒフミ", mult: 2 };
            
            if (v.includes(2)) {
                let e;
                for (let k in c) { if (c[k] == 1) e = +k; }
                return { r: e, t: e + "の目", mult: 1 };
            }
            return { r: 0, t: "役なし", mult: 1 };
        }
    </script>
</body>
</html>
